<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Login - Form</title>

    <link rel="icon" type="image/x-icon" href="./assets/login-box-line.svg" />

    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
    <link rel="stylesheet" href="./styles/login.css" />
    <link rel="stylesheet" href="./styles/html.css" />
  </head>
  <body>
    <div class="wrapper">
      <form class="form">
        <input
          type="text"
          class="username"
          placeholder="Username"
          name="username"
        />
        <input
          type="password"
          class="password"
          placeholder="Password"
          name="password"
        />
        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </div>

    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/toastify-js"
    ></script>
    <script src="./js/main.js"></script>
  </body>
</html>
