<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users</title>
    <link rel="stylesheet" href="../styles/users.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
  </head>
  <body>
    <div class="wrapper">
      <div class="sidebar">
        <ul class="side-list">
          <div class="side-box">
            <li class="side-item">
              <a href="../pages/dashboard.html" class="side-link">Products</a>
            </li>
          </div>
          <div class="side-box">
            <li class="side-item">
              <a href="#" class="side-link">Users</a>
            </li>
          </div>
          <div class="side-box">
            <li class="side-item">
              <a href="../pages/carts.html" class="side-link">Carts</a>
            </li>
          </div>
        </ul>
      </div>

      <div class="container">
        <div class="nav-container">
          <nav class="navbar">
            <h2 class="admin-title">Users - Information</h2>
            <input
              class="input"
              type="search"
              placeholder="Write anything you need..."
            />
            <button id="openModal" class="open-modal-btn">
              Add a new user
            </button>
          </nav>

          <div class="modal" id="modal">
            <div class="modal__dialog">
              <button class="modal__close" id="closeModal">x</button>
              <form class="modal__form add-form">
                <input
                  class="input2 title"
                  type="text"
                  name="email"
                  placeholder="Enter Email..."
                />
                <input
                  class="input2 price"
                  type="text"
                  name="username"
                  placeholder="Enter Username..."
                />
                <input
                  class="input2 category"
                  type="text"
                  name="password"
                  placeholder="Enter Password..."
                />
                <input
                  class="input2 description"
                  type="text"
                  name="phone"
                  placeholder="Enter Phone..."
                />
                <div class="form-buttons">
                  <button type="submit" class="btn submit-btn">Add</button>
                  <button
                    type="button"
                    class="btn cancel-btn"
                    id="closeModalBtn"
                  >
                    Cancel
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <table class="table">
          <thead>
            <tr class="table-row">
              <th>Id</th>
              <th>Email</th>
              <th>Username</th>
              <th>Password</th>
              <th>Phone</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/toastify-js"
    ></script>
    <script src="../js/users.js"></script>
  </body>
</html>
