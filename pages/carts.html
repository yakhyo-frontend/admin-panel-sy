<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Carts</title>
    <link rel="stylesheet" href="../styles/carts.css" />
  </head>
  <body>
    <div class="wrapper">
      <aside class="sidebar">
        <ul class="side-list">
          <div class="side-box" href="#">
            <li class="side-item">
              <a href="#" class="side-link">Products</a>
            </li>
          </div>
          <div class="side-box" href="../pages/users.html">
            <li class="side-item">
              <a href="../pages/users.html" class="side-link">Users</a>
            </li>
          </div>
          <div class="side-box">
            <li class="side-item">
              <a href="../pages/carts.html" class="side-link">Carts</a>
            </li>
          </div>
        </ul>
      </aside>

      <main class="container">
        <div class="nav-container">
          <nav class="navbar">
            <h2 class="admin-title">Carts - Information</h2>
            <input
              id="searchInput"
              class="input"
              type="search"
              placeholder="Write cart id, user id, or product..."
            />
          </nav>
        </div>

        <table>
          <thead>
            <tr class="table-row">
              <th>T/R</th>
              <th>userId</th>
              <th>Date</th>
              <th>productId</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody></tbody>
        </table>

        <div class="modal" id="modal">
          <div class="modal__dialog">
            <button class="modal__close" id="closeModal">x</button>
            <div class="content"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="../js/carts.js"></script>
  </body>
</html>
